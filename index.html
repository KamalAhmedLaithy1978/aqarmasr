<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>عقار مصر</title>
</head>

<body style="font-family: Arial; direction: rtl; padding:20px;">

  <h1>🏠 عقار مصر</h1>

 <h2>إضافة إعلان جديد</h2>

<input id="title" placeholder="عنوان العقار"><br><br>

<input id="price" placeholder="السعر"><br><br>
<input type="file" id="imageInput" accept="image/*">
<input id="location" placeholder="الموقع"><br><br>

<textarea id="description" placeholder="الوصف"></textarea><br><br>

<button onclick="handleSubmit()">نشر الإعلان</button>  
<hr>
  
<div id="listings"></div>
<script type="module">
window.handleSubmit = async () => {

  const file = document.getElementById("imageInput").files[0];

  if (!file) {
    alert("اختر صورة أولاً");
    return;
  }

  const imageUrl = await uploadImage(file);

  await addDoc(collection(db, "listings"), {
    title: document.getElementById("title").value,
    price: document.getElementById("price").value,
    location: document.getElementById("location").value,
    description: document.getElementById("description").value,
    image: imageUrl
  });

  alert("تم نشر الإعلان");
  location.reload();
};
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

    import {
      getFirestore,
      collection,
      getDocs,
      addDoc
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBbWyJgSN5j-34zICu1N1qT10WhnbMd0Y4",
      authDomain: "aqarmasr-7abe0.firebaseapp.com",
      projectId: "aqarmasr-7abe0",
      storageBucket: "aqarmasr-7abe0.firebasestorage.app",
      messagingSenderId: "892245289278",
      appId: "1:892245289278:web:f50c5e68da5b04e4d6a46f"
    };

    const app = initializeApp(firebaseConfig);

    const db = getFirestore(app);

    async function loadListings() {

      const querySnapshot = await getDocs(collection(db, "listings"));

      let html = "";

      querySnapshot.forEach((doc) => {

        const data = doc.data();

        html += `
          <div style="border:1px solid #ccc;padding:15px;margin:15px;border-radius:10px;">
            <h2>${data.title}</h2>
            <p>💰 السعر: ${data.price}</p>
            <p>📍 الموقع: ${data.location}</p>
            <p>${data.description || ""}</p>
          </div>
        `;
      });

     document.getElementById("listings").innerHTML = html;
}

loadListings();
  <img src="${data.image}" width="200">
</script>

</body> 
</html>
