<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>AQAR MASR | عقار مصر</title>

<style>
body{
margin:0;
font-family:Arial;
direction:rtl;
background:#0b1220;
color:white;
}

header{
background:#0f172a;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.wrapper{display:flex;height:100vh}

.left{
flex:1;
background:#0f172a;
padding:10px;
overflow:auto;
}

.right{
flex:2;
padding:10px;
overflow:auto;
}

input,select,textarea{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:5px;
}

.green{background:#22c55e}
.blue{background:#3b82f6}
.red{background:#ef4444}

.card{
background:#111827;
padding:10px;
border-radius:12px;
margin-bottom:10px;
}

.price{color:#22c55e;font-weight:bold}
</style>
</head>

<body>

<header>🏢 AQAR MASR | عقار مصر</header>

<div class="wrapper">

<div class="left">

<h3>👤 الحساب</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button class="green" onclick="signup()">تسجيل</button>
<button class="green" onclick="login()">دخول</button>
<button class="red" onclick="logout()">خروج</button>

<p id="userBox"></p>

<hr>

<h3>➕ إضافة إعلان (Firestore)</h3>

<input id="title" placeholder="العنوان">
<input id="price" placeholder="السعر">

<select id="gov">
<option>القاهرة</option>
<option>الجيزة</option>
<option>الإسكندرية</option>
</select>

<textarea id="desc" placeholder="الوصف"></textarea>

<button class="blue" onclick="addAd()">نشر إعلان</button>

<hr>

<h3>🔎 بحث</h3>
<input id="search" placeholder="بحث">
<button class="blue" onclick="filter()">بحث</button>

</div>

<div class="right">
<h2>🏠 الإعلانات</h2>
<div id="list"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* CONFIG */
const firebaseConfig = {
apiKey: "AIzaSyBbWyJgSN5j-34zICu1N1qT10WhnbMd0Y4",
authDomain: "aqarmasr-7abe0.firebaseapp.com",
projectId: "aqarmasr-7abe0",
storageBucket: "aqarmasr-7abe0.appspot.com",
messagingSenderId: "892245289278",
appId: "1:892245289278:web:f50c5e68da5b04e4d6a46f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let ads = [];

/* AUTH */
window.signup = async () => {
try {
const email = email.value;
const password = password.value;

await createUserWithEmailAndPassword(auth, email, password);
alert("تم التسجيل");
} catch(e){
alert(e.code + " : " + e.message);
}
};

window.login = async () => {
try {
await signInWithEmailAndPassword(auth, email.value, password.value);
alert("تم تسجيل الدخول");
} catch(e){
alert(e.code + " : " + e.message);
}
};

window.logout = async () => {
await signOut(auth);
alert("تم الخروج");
};

/* USER */
onAuthStateChanged(auth,(user)=>{
userBox.innerText = user ? user.email : "زائر";
loadAds();
});

/* ADD TO FIRESTORE */
window.addAd = async () => {
try{
await addDoc(collection(db,"ads"),{
title:title.value,
price:price.value,
gov:gov.value,
desc:desc.value,
time:Date.now()
});
alert("تم نشر الإعلان");
loadAds();
}catch(e){
alert(e.message);
}
};

/* LOAD ADS */
async function loadAds(){
let snap = await getDocs(collection(db,"ads"));
ads = [];
snap.forEach(d=>ads.push(d.data()));
render(ads);
}

/* SEARCH */
window.filter = () => {
let s = search.value.toLowerCase();
render(ads.filter(a=>a.title.toLowerCase().includes(s)));
};

/* RENDER */
function render(list){
let html="";
list.forEach(a=>{
html+=`
<div class="card">
<h3>${a.title}</h3>
<p class="price">${a.price}</p>
<p>${a.gov || ""}</p>
<p>${a.desc || ""}</p>
</div>
`;
});
list.innerHTML = html;
}

</script>

</body>
</html>
