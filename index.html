<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>عقار مصر | AQARMASR</title>

<style>
body{
margin:0;
font-family:Arial;
direction:rtl;
background:#0b1220;
color:white;
}

header{
background:#0f172a;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.container{max-width:1100px;margin:auto;padding:15px;}

.hero{
height:220px;
background:url("https://images.unsplash.com/photo-1507089947368-19c1da9775ae") center/cover;
display:flex;
align-items:center;
justify-content:center;
border-radius:12px;
margin:10px 0;
}

.hero h1{
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:10px;
}

input,textarea{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:8px;
}

button{
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
margin:3px 0;
width:100%;
}

.green{background:#22c55e;color:black}
.red{background:#ef4444;color:white}
.blue{background:#3b82f6;color:white}

.search{
width:100%;
padding:10px;
border-radius:8px;
border:none;
margin:10px 0;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:15px;
}

.card{
background:#111827;
border-radius:12px;
overflow:hidden;
}

.card img{
width:100%;
height:170px;
object-fit:cover;
}

.card-body{padding:10px}

.price{color:#22c55e;font-weight:bold}

.badge{
background:#f59e0b;
color:black;
padding:3px 7px;
border-radius:6px;
font-size:12px;
}
</style>
</head>

<body>

<header>🏢 عقار مصر | AQARMASR</header>

<div class="container">

<div class="hero">
<h1>🏠 ابحث عن عقارك بسهولة</h1>
</div>

<h3>👤 الحساب</h3>
<input id="email" placeholder="البريد">
<input id="password" type="password" placeholder="كلمة المرور">

<button class="green" onclick="signup()">تسجيل</button>
<button class="green" onclick="login()">دخول</button>
<button class="red" onclick="logout()">خروج</button>

<p id="userBox"></p>

<h3>➕ إضافة إعلان (بعد الدفع لاحقًا)</h3>
<input id="title" placeholder="العنوان">
<input id="price" placeholder="السعر">
<input id="location" placeholder="الموقع">
<textarea id="desc" placeholder="الوصف"></textarea>
<input type="file" id="img">

<button class="green" onclick="createAd()">إنشاء طلب إعلان</button>

<input class="search" id="search" placeholder="بحث..." oninput="filter()">

<div class="grid" id="list"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore, collection, addDoc, getDocs, updateDoc, doc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let user=null;
let all=[];

/* رفع صورة */
async function upload(file){
const f=new FormData();
f.append("file",file);
f.append("upload_preset","aqar_upload");

const r=await fetch("https://api.cloudinary.com/v1_1/duchftqn1/image/upload",{method:"POST",body:f});
const d=await r.json();
return d.secure_url;
}

/* تسجيل */
window.signup=()=>createUserWithEmailAndPassword(auth,email.value,password.value);
window.login=()=>signInWithEmailAndPassword(auth,email.value,password.value);
window.logout=()=>signOut(auth);

/* حالة المستخدم */
onAuthStateChanged(auth,(u)=>{
user=u;
userBox.innerText=u?u.email:"زائر";
load();
});

/* إنشاء إعلان (Pending) */
window.createAd = async () => {

if(!user){
alert("يجب تسجيل الدخول");
return;
}

let image = "";
if(img.files && img.files[0]){
image = await upload(img.files[0]);
}

await addDoc(collection(db,"listings"),{
title:title.value,
price:price.value,
location:location.value,
desc:desc.value,
image,
uid:user.uid,
status:"pending",
paid:false,
time:Date.now()
});

alert("تم إنشاء الطلب، سيتم تفعيله بعد الدفع");
load();
};

/* تحميل */
async function load(){
const snap=await getDocs(collection(db,"listings"));
all=[];
snap.forEach(d=>all.push({id:d.id,...d.data()}));
render(all);
}

/* عرض فقط النشط */
function render(list){

let html="";

list.forEach(d=>{

if(d.status !== "active") return;

html+=`
<div class="card">
${d.image?`<img src="${d.image}">`:``}
<div class="card-body">

<h3>${d.title}</h3>
<div class="price">${d.price}</div>
<p>📍 ${d.location}</p>
<p>${d.desc||""}</p>

${d.featured?`<div class="badge">⭐ مميز</div>`:""}

</div>
</div>
`;
});

list.innerHTML=html;
}

/* تفعيل إعلان (محاكاة دفع) */
window.activate = async (id) => {
await updateDoc(doc(db,"listings",id),{
status:"active",
paid:true
});
load();
};

/* بحث */
window.filter=()=>{
let v=search.value.toLowerCase();
render(all.filter(d=>
(d.title||"").toLowerCase().includes(v) ||
(d.location||"").toLowerCase().includes(v)
));
};

load();

</script>

</body>
</html>
