<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>عقار مصر</title>

<style>
body{
margin:0;
font-family:Arial;
direction:rtl;
background:#0b1220;
color:white;
}

/* تقسيم الصفحة */
.wrapper{
display:flex;
height:100vh;
}

/* اليمين = الإعلانات */
.right{
flex:2;
padding:15px;
overflow:auto;
}

/* اليسار = تسجيل + بحث */
.left{
flex:1;
background:#0f172a;
padding:15px;
overflow:auto;
border-left:2px solid #1f2937;
}

.card{
background:#111827;
border-radius:12px;
padding:10px;
margin-bottom:10px;
}

.price{color:#22c55e;font-weight:bold}

/* inputs */
input,select{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:8px;
margin-top:5px;
cursor:pointer;
}

.green{background:#22c55e}
.blue{background:#3b82f6}
.red{background:#ef4444}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:10px;
}
</style>
</head>

<body>

<div class="wrapper">

<!-- يمين: الإعلانات -->
<div class="right">
<h2>🏠 الإعلانات</h2>
<div id="list" class="grid"></div>
</div>

<!-- يسار: تسجيل + بحث -->
<div class="left">

<h3>👤 تسجيل الدخول</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button class="green" onclick="signup()">تسجيل جديد</button>
<button class="green" onclick="login()">دخول</button>
<button class="red" onclick="logout()">خروج</button>

<p id="userBox"></p>

<hr>

<h3>➕ إضافة إعلان</h3>

<input id="title" placeholder="العنوان">
<input id="price" placeholder="السعر">

<!-- المحافظات -->
<select id="gov" onchange="loadCities()">
<option>اختر المحافظة</option>
<option>القاهرة</option>
<option>الجيزة</option>
<option>الإسكندرية</option>
<option>الدقهلية</option>
<option>الشرقية</option>
<option>الغربية</option>
<option>المنيا</option>
<option>أسيوط</option>
</select>

<!-- المراكز -->
<select id="city">
<option>اختر المركز</option>
</select>

<button class="blue" onclick="createAd()">نشر إعلان</button>

<hr>

<h3>🔎 بحث</h3>

<select id="fGov">
<option value="">كل المحافظات</option>
<option>القاهرة</option>
<option>الجيزة</option>
<option>الإسكندرية</option>
<option>الدقهلية</option>
<option>الشرقية</option>
<option>الغربية</option>
<option>المنيا</option>
<option>أسيوط</option>
</select>

<button class="blue" onclick="filter()">بحث</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore, collection, addDoc, getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let user=null;
let all=[];

/* تسجيل */
window.signup=()=>createUserWithEmailAndPassword(auth,email.value,password.value);
window.login=()=>signInWithEmailAndPassword(auth,email.value,password.value);
window.logout=()=>signOut(auth);

onAuthStateChanged(auth,(u)=>{
user=u;
userBox.innerText=u?u.email:"زائر";
load();
});

/* المحافظات → مراكز مصر */
window.loadCities=()=>{
let g=gov.value;
let c=document.getElementById("city");

let map={
"القاهرة":["مدينة نصر","المعادي","مصر الجديدة","حلوان"],
"الجيزة":["الدقي","الهرم","6 أكتوبر","فيصل"],
"الإسكندرية":["سيدي جابر","العجمي","محرم بك"],
"الدقهلية":["المنصورة","طلخا","ميت غمر"],
"الشرقية":["الزقازيق","بلبيس","أبو حماد"],
"الغربية":["طنطا","المحلة","زفتى"],
"المنيا":["المنيا","مغاغة","ملوي"],
"أسيوط":["أسيوط","ديروط","صدفا"]
};

c.innerHTML="<option>اختر المركز</option>";

if(map[g]){
map[g].forEach(x=>{
c.innerHTML+=`<option>${x}</option>`;
});
}
};

/* إضافة إعلان */
window.createAd=async()=>{

if(!user){alert("سجل دخول أولاً");return;}

await addDoc(collection(db,"listings"),{
title:title.value,
price:Number(price.value),
gov:gov.value,
city:city.value,
uid:user.uid,
time:Date.now()
});

load();
};

/* تحميل */
async function load(){
let snap=await getDocs(collection(db,"listings"));
all=[];
snap.forEach(d=>all.push(d.data()));
render(all);
}

/* عرض */
function render(list){

let html="";

list.forEach(d=>{
html+=`
<div class="card">
<h3>${d.title}</h3>
<div class="price">${d.price} جنيه</div>
<p>${d.gov} - ${d.city}</p>
</div>
`;
});

list.innerHTML=html;
}

/* فلترة */
window.filter=()=>{
let g=fGov.value;
render(all.filter(d=>!g || d.gov===g));
};

load();

</script>

</body>
</html>
