<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Global Real Estate SaaS</title>

<style>
body{
margin:0;
font-family:Arial;
direction:rtl;
background:#0b1220;
color:white;
}

header{
background:#0f172a;
padding:15px;
text-align:center;
font-size:20px;
}

.container{
max-width:1200px;
margin:auto;
padding:15px;
}

/* HERO */
.hero{
height:250px;
background:url("https://images.unsplash.com/photo-1501594907352-04cda38ebc29") center/cover;
display:flex;
align-items:center;
justify-content:center;
border-radius:15px;
margin-bottom:15px;
}

.hero h1{
background:rgba(0,0,0,0.6);
padding:12px;
border-radius:10px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:15px;
}

/* CARD */
.card{
background:#111827;
border-radius:15px;
overflow:hidden;
transition:0.3s;
}

.card:hover{transform:scale(1.03)}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-body{
padding:10px;
}

.price{
color:#22c55e;
font-weight:bold;
}

.badge{
background:#f59e0b;
color:black;
padding:4px 8px;
border-radius:6px;
font-size:12px;
display:inline-block;
margin-top:5px;
}

input,textarea{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:none;
}

button{
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
margin:3px 0;
}

.green{background:#22c55e;color:black;width:100%}
.red{background:#ef4444;color:white;width:100%}
.blue{background:#3b82f6;color:white;width:100%}

.search{
width:100%;
padding:10px;
border-radius:8px;
border:none;
margin:10px 0;
}
</style>
</head>

<body>

<header>🏢 Global Real Estate SaaS Platform</header>

<div class="container">

<div class="hero">
<h1>🌍 Explore Global Properties</h1>
</div>

<!-- AUTH -->
<div>
<h3>Account</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button class="green" onclick="signup()">Sign Up</button>
<button class="green" onclick="login()">Login</button>
<button class="red" onclick="logout()">Logout</button>

<p id="userBox"></p>
</div>

<!-- CREATE -->
<div>
<h3>Create Listing</h3>

<input id="title" placeholder="Title">
<input id="price" placeholder="Price">
<input id="location" placeholder="Location">
<textarea id="desc" placeholder="Description"></textarea>
<input type="file" id="img">

<button class="green" onclick="add()">Publish</button>
</div>

<input id="search" class="search" placeholder="Search..." oninput="filter()">

<div class="grid" id="list"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore, collection, addDoc,
getDocs, deleteDoc, doc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let user=null;
let all=[];

/* CLOUDINARY */
async function upload(file){
const f=new FormData();
f.append("file",file);
f.append("upload_preset","aqar_upload");

const r=await fetch("https://api.cloudinary.com/v1_1/duchftqn1/image/upload",{method:"POST",body:f});
const d=await r.json();
return d.secure_url;
}

/* AUTH */
window.signup=()=>createUserWithEmailAndPassword(auth,email.value,password.value);
window.login=()=>signInWithEmailAndPassword(auth,email.value,password.value);
window.logout=()=>signOut(auth);

onAuthStateChanged(auth,(u)=>{
user=u;
userBox.innerText=u?u.email:"Guest Mode";
load();
});

/* ADD */
window.add=async()=>{

let img="";
if(img.files && img.files.length>0){
img=await upload(img.files[0]);
}

await addDoc(collection(db,"listings"),{
title:title.value,
price:price.value,
location:location.value,
desc:desc.value,
image:img,
uid:user?user.uid:null,
featured:false,
boost:false,
time:Date.now()
});

load();
};

/* LOAD */
async function load(){
const snap=await getDocs(collection(db,"listings"));
all=[];
snap.forEach(d=>all.push({id:d.id,...d.data()}));
all.sort((a,b)=>b.time-a.time);
render(all);
}

/* RENDER */
function render(list){

let html="";

list.forEach(d=>{

html+=`
<div class="card">

${d.image?`<img src="${d.image}">`:``}

<div class="card-body">

<h3>${d.title}</h3>

<div class="price">${d.price}</div>
<p>${d.location}</p>
<p>${d.desc||""}</p>

${d.featured?`<div class="badge">⭐ Featured</div>`:""}
${d.boost?`<div class="badge">🚀 Boost</div>`:""}

${user && user.uid===d.uid?`
<button class="red" onclick="del('${d.id}')">Delete</button>
<button class="blue" onclick="feature('${d.id}')">⭐ Feature</button>
<button class="blue" onclick="boost('${d.id}')">🚀 Boost</button>
`:``}

</div>

</div>
`;
});

list.innerHTML=html;
}

/* DELETE */
window.del=async(id)=>{
await deleteDoc(doc(db,"listings",id));
load();
};

/* FEATURE (ready for payment) */
window.feature=async(id)=>{
let item=all.find(x=>x.id===id);
await addDoc(collection(db,"listings"),{...item,featured:true,time:Date.now()});
await deleteDoc(doc(db,"listings",id));
load();
};

/* BOOST (payment placeholder) */
window.boost=async(id)=>{
alert("💳 سيتم ربط الدفع الحقيقي لاحقًا (Stripe Ready)");
};

/* SEARCH */
window.filter=()=>{
let v=search.value.toLowerCase();
render(all.filter(d=>
(d.title||"").toLowerCase().includes(v)||
(d.location||"").toLowerCase().includes(v)
));
};

load();

</script>

</body>
</html>
