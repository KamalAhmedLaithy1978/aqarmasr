<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>AQAR MASR | عقار مصر</title>

<style>
body{
margin:0;
font-family:Arial;
direction:rtl;
background:#0b1220;
color:white;
}

header{
background:#0f172a;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.wrapper{display:flex;height:100vh}

/* LEFT */
.left{
flex:1;
background:#0f172a;
padding:10px;
overflow:auto;
}

/* RIGHT */
.right{
flex:2;
padding:10px;
overflow:auto;
}

input,select,textarea{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:5px;
}

.green{background:#22c55e}
.blue{background:#3b82f6}
.red{background:#ef4444}

.card{
background:#111827;
padding:10px;
border-radius:12px;
margin-bottom:10px;
}

.price{color:#22c55e;font-weight:bold}
</style>
</head>

<body>

<header>🏢 AQAR MASR | عقار مصر</header>

<div class="wrapper">

<!-- LEFT -->
<div class="left">

<h3>👤 الحساب</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button class="green" onclick="signup()">تسجيل</button>
<button class="green" onclick="login()">دخول</button>
<button class="red" onclick="logout()">خروج</button>

<p id="userBox"></p>

<hr>

<h3>➕ طلب نشر إعلان (بعد الدفع)</h3>

<input id="title" placeholder="العنوان">
<input id="price" placeholder="السعر">

<select id="gov" onchange="loadCities()">
<option>المحافظة</option>
<option>القاهرة</option>
<option>الجيزة</option>
<option>الإسكندرية</option>
</select>

<select id="city">
<option>المركز</option>
</select>

<textarea id="desc" placeholder="الوصف"></textarea>

<input type="file" id="img">

<button class="blue" onclick="createAd()">إرسال طلب نشر</button>

<hr>

<h3>🔎 بحث</h3>

<select id="fGov">
<option value="">كل المحافظات</option>
<option>القاهرة</option>
<option>الجيزة</option>
<option>الإسكندرية</option>
</select>

<input id="min" placeholder="أقل سعر">
<input id="max" placeholder="أعلى سعر">

<button class="blue" onclick="filter()">بحث</button>

<hr>

<h3>🛡 لوحة الإدارة</h3>
<button class="red" onclick="adminLoad()">طلبات معلقة</button>

</div>

<!-- RIGHT -->
<div class="right">
<h2>🏠 الإعلانات النشطة</h2>
<div id="list"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  updateDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";;

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyBbWyJgSN5j-34zICu1N1qT10WhnbMd0Y4",
  authDomain: "aqarmasr-7abe0.firebaseapp.com",
  projectId: "aqarmasr-7abe0",
+ storageBucket: "aqarmasr-7abe0.appspot.com",
  messagingSenderId: "892245289278",
  appId: "1:892245289278:web:f50c5e68da5b04e4d6a46f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let user=null;
let all=[];

/* AUTH */
window.signup = async () => {
  try {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    await createUserWithEmailAndPassword(auth, email, password);

    alert("تم إنشاء الحساب بنجاح");
  } catch (e) {
    alert("خطأ: " + e.message);
  }
};

window.login = async () => {
  try {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    await signInWithEmailAndPassword(auth, email, password);

    alert("تم تسجيل الدخول");
  } catch (e) {
    alert("خطأ: " + e.message);
  }
};

window.logout = async () => {
  await signOut(auth);
  alert("تم تسجيل الخروج");
};

onAuthStateChanged(auth,(u)=>{
user=u;
userBox.innerText=u?u.email:"زائر";
load();
});

/* CITIES */
window.loadCities=()=>{
const map={
"القاهرة":["مدينة نصر","المعادي","مصر الجديدة"],
"الجيزة":["الدقي","الهرم","6 أكتوبر"],
"الإسكندرية":["سيدي جابر","العجمي"]
};

city.innerHTML="<option>المركز</option>";

if(map[gov.value]){
map[gov.value].forEach(x=>{
city.innerHTML+=`<option>${x}</option>`;
});
}
};

/* UPLOAD IMAGE */
async function upload(file){
const f=new FormData();
f.append("file",file);
f.append("upload_preset","aqar_upload");

const r=await fetch("https://api.cloudinary.com/v1_1/duchftqn1/image/upload",{method:"POST",body:f});
const d=await r.json();
return d.secure_url;
}

/* CREATE (PENDING) */
window.createAd=async()=>{

if(!user){alert("سجل دخول");return;}

let imgUrl="";
if(img.files[0]) imgUrl=await upload(img.files[0]);

await addDoc(collection(db,"listings"),{
title:title.value,
price:Number(price.value),
gov:gov.value,
city:city.value,
desc:desc.value,
image:imgUrl,
uid:user.uid,
status:"pending",
time:Date.now()
});

alert("تم إرسال الطلب — بانتظار الدفع والتفعيل");
load();
};

/* LOAD ACTIVE ONLY */
async function load(){
const snap=await getDocs(collection(db,"listings"));
all=[];
snap.forEach(d=>all.push({id:d.id,...d.data()}));
render(all.filter(d=>d.status==="active"));
}

/* RENDER */
function render(list){

let html="";

list.forEach(d=>{
html+=`
<div class="card">
${d.image?`<img src="${d.image}" style="width:100%;border-radius:10px;">`:``}
<h3>${d.title}</h3>
<div class="price">${d.price} جنيه</div>
<p>${d.gov} - ${d.city}</p>
<p>${d.desc||""}</p>
</div>
`;
});

document.getElementById("list").innerHTML=html;
}

/* FILTER */
window.filter=()=>{
let g=fGov.value;
let min=Number(min.value||0);
let max=Number(max.value||999999999);

render(all.filter(d=>
d.status==="active" &&
(!g || d.gov===g) &&
(d.price>=min && d.price<=max)
));
};

/* ADMIN PANEL */
window.adminLoad=()=>{
let pending=all.filter(d=>d.status==="pending");

let html="";

pending.forEach(d=>{
html+=`
<div class="card">
<h3>${d.title}</h3>
<p>${d.price}</p>
<button class="green" onclick="activate('${d.id}')">تفعيل بعد الدفع</button>
</div>
`;
});

document.getElementById("list").innerHTML=html;
};

window.activate=async(id)=>{
await updateDoc(doc(db,"listings",id),{
status:"active"
});
load();
};

</script>

</body>
</html>
