<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>عقار مصر AQARMASR</title>

<style>
body{
margin:0;
font-family:Arial;
direction:rtl;
background:#0b1220;
color:white;
}

header{
background:#0f172a;
padding:15px;
text-align:center;
font-weight:bold;
}

.container{max-width:1100px;margin:auto;padding:15px;}

input,select,textarea{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:5px;
}

.green{background:#22c55e}
.red{background:#ef4444}
.blue{background:#3b82f6}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:15px;
margin-top:15px;
}

.card{
background:#111827;
border-radius:12px;
overflow:hidden;
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card-body{padding:10px}

.price{color:#22c55e;font-weight:bold}
</style>
</head>

<body>

<header>🏢 عقار مصر AQARMASR</header>

<div class="container">

<h3>تسجيل الدخول</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button class="green" onclick="signup()">تسجيل</button>
<button class="green" onclick="login()">دخول</button>
<button class="red" onclick="logout()">خروج</button>

<p id="userBox"></p>

<hr>

<h3>إضافة إعلان</h3>

<input id="title" placeholder="العنوان">
<input id="price" placeholder="السعر">

<!-- المحافظات -->
<select id="gov" onchange="updateCities()">
<option>اختر المحافظة</option>
<option>القاهرة</option>
<option>الجيزة</option>
<option>الإسكندرية</option>
<option>الدقهلية</option>
</select>

<!-- المراكز -->
<select id="city">
<option>اختر المركز</option>
</select>

<textarea id="desc" placeholder="الوصف"></textarea>

<button class="blue" onclick="createAd()">نشر إعلان</button>

<hr>

<h3>🔎 البحث</h3>

<select id="filterGov">
<option value="">كل المحافظات</option>
<option>القاهرة</option>
<option>الجيزة</option>
<option>الإسكندرية</option>
</select>

<input id="minPrice" placeholder="أقل سعر">
<input id="maxPrice" placeholder="أعلى سعر">

<button class="blue" onclick="filter()">بحث</button>

<div class="grid" id="list"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore, collection, addDoc, getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let user=null;
let all=[];

/* auth */
window.signup=()=>createUserWithEmailAndPassword(auth,email.value,password.value);
window.login=()=>signInWithEmailAndPassword(auth,email.value,password.value);
window.logout=()=>signOut(auth);

onAuthStateChanged(auth,(u)=>{
user=u;
userBox.innerText=u?u.email:"زائر";
load();
});

/* المحافظات → مراكز */
window.updateCities=()=>{
const gov=gov.value;
const city=document.getElementById("city");

let options=[];

if(gov==="القاهرة") options=["مدينة نصر","المعادي","مصر الجديدة"];
if(gov==="الجيزة") options=["الدقي","6 أكتوبر","الهرم"];
if(gov==="الإسكندرية") options=["سيدي جابر","العجمي"];
if(gov==="الدقهلية") options=["المنصورة","طلخا"];

city.innerHTML="<option>اختر المركز</option>";

options.forEach(c=>{
city.innerHTML+=`<option>${c}</option>`;
});
};

/* إنشاء إعلان */
window.createAd=async()=>{

if(!user){alert("سجل دخول");return;}

await addDoc(collection(db,"listings"),{
title:title.value,
price:Number(price.value),
gov:gov.value,
city:city.value,
desc:desc.value,
uid:user.uid,
time:Date.now()
});

load();
};

/* تحميل */
async function load(){
const snap=await getDocs(collection(db,"listings"));
all=[];
snap.forEach(d=>all.push(d.data()));
render(all);
}

/* عرض */
function render(list){

let html="";

list.forEach(d=>{

html+=`
<div class="card">
<div class="card-body">

<h3>${d.title}</h3>
<div class="price">${d.price} جنيه</div>
<p>${d.gov} - ${d.city}</p>
<p>${d.desc||""}</p>

</div>
</div>
`;
});

document.getElementById("list").innerHTML=html;
}

/* بحث */
window.filter=()=>{

let g=document.getElementById("filterGov").value;
let min=Number(minPrice.value||0);
let max=Number(maxPrice.value||999999999);

render(all.filter(d=>
(!g || d.gov===g) &&
(d.price>=min && d.price<=max)
));
};

load();

</script>

</body>
</html>
