<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>AQAR MASR | عقار مصر</title>

<style>
body{
margin:0;
font-family:Arial;
direction:rtl;
background:#0b1220;
color:white;
}

header{
background:#0f172a;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.wrapper{display:flex;height:100vh}

.left{
flex:1;
background:#0f172a;
padding:10px;
overflow:auto;
}

.right{
flex:2;
padding:10px;
overflow:auto;
}

input,select,textarea{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:5px;
}

.green{background:#22c55e}
.blue{background:#3b82f6}
.red{background:#ef4444}

.card{
background:#111827;
padding:10px;
border-radius:12px;
margin-bottom:10px;
}

.price{color:#22c55e;font-weight:bold}
</style>
</head>

<body>

<header>🏢 AQAR MASR | عقار مصر</header>

<div class="wrapper">

<!-- LEFT -->
<div class="left">

<h3>👤 الحساب</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button class="green" onclick="signup()">تسجيل</button>
<button class="green" onclick="login()">دخول</button>
<button class="red" onclick="logout()">خروج</button>

<p id="userBox"></p>

<hr>

<h3>➕ إضافة إعلان</h3>

<input id="title" placeholder="العنوان">
<input id="price" placeholder="السعر">

<select id="gov">
<option>القاهرة</option>
<option>الجيزة</option>
<option>الإسكندرية</option>
</select>

<textarea id="desc" placeholder="الوصف"></textarea>

<button class="blue" onclick="addAd()">نشر الإعلان</button>

<hr>

<h3>🔎 بحث</h3>
<input id="search" placeholder="بحث بالاسم">
<button class="blue" onclick="filter()">بحث</button>

</div>

<!-- RIGHT -->
<div class="right">
<h2>🏠 الإعلانات</h2>
<div id="list"></div>
</div>

</div>

<script type="module">

/* FIREBASE IMPORTS (FIXED) */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* FIREBASE CONFIG (FIXED) */
const firebaseConfig = {
apiKey: "AIzaSyBbWyJgSN5j-34zICu1N1qT10WhnbMd0Y4",
authDomain: "aqarmasr-7abe0.firebaseapp.com",
projectId: "aqarmasr-7abe0",
storageBucket: "aqarmasr-7abe0.appspot.com",
messagingSenderId: "892245289278",
appId: "1:892245289278:web:f50c5e68da5b04e4d6a46f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let ads = [];

/* AUTH FIXED */
window.signup = async () => {
try {
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const res = await createUserWithEmailAndPassword(auth, email, password);
alert("تم التسجيل: " + res.user.email);
} catch (e) {
alert(e.code + " : " + e.message);
}
};

window.login = async () => {
try {
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

await signInWithEmailAndPassword(auth, email, password);
alert("تم تسجيل الدخول");
} catch (e) {
alert(e.code + " : " + e.message);
}
};

window.logout = async () => {
await signOut(auth);
alert("تم تسجيل الخروج");
};

/* LOAD USER */
onAuthStateChanged(auth,(user)=>{
document.getElementById("userBox").innerText = user ? user.email : "زائر";
});

/* ADD AD (LOCAL TEMP FOR NOW) */
window.addAd = () => {

let ad = {
title: document.getElementById("title").value,
price: document.getElementById("price").value,
gov: document.getElementById("gov").value,
desc: document.getElementById("desc").value
};

ads.push(ad);
render(ads);

};

/* SEARCH */
window.filter = () => {
let s = document.getElementById("search").value.toLowerCase();

if(!s){
render(ads);
return;
}

render(ads.filter(a =>
a.title.toLowerCase().includes(s)
));
};

/* RENDER */
function render(list){
let html = "";

list.forEach(a=>{
html += `
<div class="card">
<h3>${a.title}</h3>
<p class="price">${a.price}</p>
<p>${a.gov}</p>
<p>${a.desc}</p>
</div>
`;
});

document.getElementById("list").innerHTML = html;
}

render(ads);

</script>

</body>
</html>
